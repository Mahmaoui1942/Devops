apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: pixelwar
  labels:
    app: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
     # securityContext:
      #  runAsNonRoot: true
       # runAsUser: 101   # nginx default non-root user
      containers:
        - name: frontend
          image: europe-west1-docker.pkg.dev/pixel-war-489910/pixel-war/frontend:latest
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: "10m"
              memory: "32Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: pixelwar
spec:
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 8080
