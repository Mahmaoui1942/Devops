apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: pixelwar-ingress
  namespace: pixelwar
  annotations:
    kubernetes.io/ingress.global-static-ip-name: "pixelwar-ip"
spec:
  ingressClassName: gce
  rules:
    - http:
        paths:
          - path: /api/*
            pathType: ImplementationSpecific
            backend:
              service:
                name: backend
                port:
                  number: 5000
          - path: /*
            pathType: ImplementationSpecific
            backend:
              service:
                name: frontend
                port:
                  number: 80
