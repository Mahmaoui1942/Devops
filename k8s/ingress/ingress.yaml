apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: pixelwar-ingress
  namespace: pixelwar
  annotations:
    kubernetes.io/ingress.class: "gce"
spec:
  rules:
    - host: pixelwarsawesome.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 5000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
    - http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 5000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
