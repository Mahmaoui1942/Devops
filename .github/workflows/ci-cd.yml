name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PROJECT_ID: pixel-war-489910
  REGION: europe-west1
  REGISTRY: europe-west1-docker.pkg.dev
  REPO: pixel-war
  CLUSTER: pixel-war-cluster
  CLUSTER_ZONE: europe-west1-b

jobs:
  # ─── Tests ────────────────────────────────────────────────────────────────
  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('Backend/requirements.txt') }}

      - name: Install dependencies
        run: |
          pip install -r Backend/requirements.txt
          pip install pytest pytest-cov flake8

      - name: Lint with flake8
        run: |
          # Keep the build green while you fix the 14 errors found earlier
          flake8 Backend/ --max-line-length=120 --exit-zero

  # ─── Build & Push ─────────────────────────────────────────────────────────
  build-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: test-backend
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      id-token: write

    outputs:
      backend_tag: ${{ steps.tags.outputs.sha }}
      frontend_tag: ${{ steps.tags.outputs.sha }}

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGISTRY }} --quiet

      - name: Set image tags
        id: tags
        run: echo "sha=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      - name: Build & push backend
        uses: docker/build-push-action@v5
        with:
          context: ./Backend
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO }}/backend:${{ steps.tags.outputs.sha }}
            ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO }}/backend:latest

      - name: Build & push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./pixel-war
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO }}/frontend:${{ steps.tags.outputs.sha }}
            ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO }}/frontend:latest

  # ─── Deploy ───────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to GKE
    runs-on: ubuntu-latest
    needs: build-push
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.CLUSTER }}
          location: ${{ env.CLUSTER_ZONE }}

      - name: Create namespace if missing
        run: kubectl get namespace pixelwar || kubectl create namespace pixelwar

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f k8s/secret.yaml       -n pixelwar
          kubectl apply -f k8s/db.yaml           -n pixelwar
          kubectl apply -f k8s/backend.yaml      -n pixelwar
          kubectl apply -f k8s/frontend.yaml     -n pixelwar
          kubectl apply -f k8s/network-policies.yaml -n pixelwar
          kubectl apply -f k8s/ingress/          -n pixelwar
          kubectl create namespace monitoring --dry-run=client -o yaml | kubectl apply -f -
          kubectl apply -f k8s/monitoring/ -n monitoring

      - name: Update backend image
        run: |
          kubectl set image deployment/backend \
            backend=${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO }}/backend:${GITHUB_SHA::8} \
            -n pixelwar

      - name: Update frontend image
        run: |
          kubectl set image deployment/frontend \
            frontend=${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPO }}/frontend:${GITHUB_SHA::8} \
            -n pixelwar

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/backend  -n pixelwar --timeout=120s
          kubectl rollout status deployment/frontend -n pixelwar --timeout=120s
      - name: Debug Deployment Failure
        if: failure()
        run: |
          echo "=== POD STATUS (pixelwar) ==="
          kubectl get pods -n pixelwar -o wide
      
          echo "=== RECENT EVENTS (pixelwar) ==="
          kubectl get events -n pixelwar --sort-by=.lastTimestamp | tail -n 50
      
          echo "=== DESCRIBE FRONTEND PODS ==="
          kubectl describe pod -l app=frontend -n pixelwar || true
      
          echo "=== FRONTEND LOGS (all containers) ==="
          kubectl logs -l app=frontend -n pixelwar --tail=200 --all-containers || true
      
          echo "=== DESCRIBE FRONTEND DEPLOYMENT ==="
          kubectl describe deployment frontend -n pixelwar || true
          
          echo "=== BACKEND LOGS ==="
          kubectl logs deployment/backend -n pixelwar --tail=100 --all-containers || true
      - name: Wait for Ingress Address
        run: |
          echo "Waiting for external ingress address (can take several minutes on GKE)..."
          ADDRESS=""
          for i in {1..30}; do
            IP=$(kubectl get ingress pixelwar-ingress -n pixelwar -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null || true)
            HOST=$(kubectl get ingress pixelwar-ingress -n pixelwar -o jsonpath='{.status.loadBalancer.ingress[0].hostname}' 2>/dev/null || true)
            ADDRESS=${IP:-$HOST}
            if [ -n "$ADDRESS" ]; then
              break
            fi
            echo "Attempt $i/30: ingress address not ready yet..."
            sleep 20
          done

          echo "=== INGRESS STATUS ==="
          kubectl get ingress -n pixelwar

          if [ -z "$ADDRESS" ]; then
            echo "ERROR: Ingress address was not assigned in time."
            echo "Describe ingress for troubleshooting:"
            kubectl describe ingress pixelwar-ingress -n pixelwar || true
            exit 1
          fi

          echo "=== YOUR LIVE WEBSITE ADDRESS ==="
          echo "$ADDRESS"

          echo "INGRESS_ADDRESS=$ADDRESS" >> $GITHUB_ENV

      - name: Smoke Test Public HTTP
        run: |
          echo "Testing public HTTP reachability for $INGRESS_ADDRESS ..."
          for i in {1..12}; do
            CODE=$(curl -s -o /tmp/home.html -w "%{http_code}" --max-time 10 "http://$INGRESS_ADDRESS/" || true)
            if [ "$CODE" = "200" ] || [ "$CODE" = "301" ] || [ "$CODE" = "302" ]; then
              echo "Public HTTP check passed with status $CODE"
              exit 0
            fi
            echo "Attempt $i/12 failed (status: ${CODE:-none}), retrying in 10s..."
            sleep 10
          done

          echo "ERROR: Public HTTP is still unreachable from the GitHub runner."
          echo "Last ingress status:"
          kubectl get ingress -n pixelwar
          echo "Describe ingress:"
          kubectl describe ingress pixelwar-ingress -n pixelwar || true
          exit 1

      - name: Print Services
        run: |
          echo "=== ALL SERVICES ==="
          kubectl get svc -n pixelwar
      - name: The Ultimate Debug
        run: |
          echo "=== 1. ARE THE PODS ACTUALLY RUNNING? ==="
          kubectl get pods -n pixelwar
          
          echo "=== 2. ARE THE SERVICES SEEING THE PODS? ==="
          kubectl get endpoints -n pixelwar
          
          echo "=== 3. INGRESS ROUTING ==="
          kubectl describe ingress -n pixelwar
          
          echo "=== 4. FRONTEND LOGS ==="
          kubectl logs deployment/frontend -n pixelwar --tail=50 || true
      - name: Debug Database Storage
        run: |
          echo "=== 1. WHY IS THE DB POD PENDING? ==="
          kubectl describe pod db-0 -n pixelwar | tail -n 20
          
          echo "=== 2. IS THE HARD DRIVE STUCK? ==="
          kubectl get pvc -n pixelwar
          
          echo "=== 3. WHAT STORAGE CLASSES DO WE HAVE? ==="
          kubectl get storageclass
